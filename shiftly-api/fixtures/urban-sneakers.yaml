App\Entity\Tutoriel:
  tuto_ur_drop:
    centre:  "@centre_urban"
    titre:   "Gérer un drop sneakers — procédure anti-émeute"
    zone:    "@zone_ur_boutique"
    niveau:  "intermediaire"
    dureMin: 20
    contenu:
      - { type: "intro", text: "Les drops attirent du monde. Une bonne orga évite les incidents — et garantit l'équité entre clients." }
      - { type: "step", number: 1, title: "Avant ouverture", text: "Distribuer tickets de passage à la queue. Afficher stock par taille en vitrine." }
      - { type: "step", number: 2, title: "Gestion flux", text: "Max 3 clients simultanés en boutique. Pièce d'identité vérifiée pour chaque achat." }
      - { type: "step", number: 3, title: "Sécurité", text: "Maxi 1 paire par client. Tout comportement suspect : appel manager + signalement." }
      - { type: "tip", text: "En cas de tension : fermer la porte, laisser s'écouler 10 min, reprendre. Ne jamais gérer seul." }
  tuto_ur_barista:
    centre:  "@centre_urban"
    titre:   "Espresso barista — latte art basique"
    zone:    "@zone_ur_coffee"
    niveau:  "debutant"
    dureMin: 15
    contenu:
      - { type: "intro", text: "Un bon café, c'est 30% de l'expérience Urban. Un latte raté = client déçu. Suivre la recette." }
      - { type: "step", number: 1, title: "Extraction espresso", text: "Dose 18g de café moulu fin. Tassage ferme. Extraction 25-30 sec pour 30 ml." }
      - { type: "step", number: 2, title: "Émulsion lait", text: "Lait froid en pichet acier. Buse vapeur : créer micro-mousse 60°C max. Pas de grosses bulles." }
      - { type: "step", number: 3, title: "Latte art", text: "Verser lentement au centre, puis remonter et rapprocher pour dessiner un cœur ou rosetta." }

