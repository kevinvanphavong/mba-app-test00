App\Entity\Tutoriel:
  tuto_es_gm:
    centre:  "@centre_escape"
    titre:   "Pilotage Game Master — donner les bons indices"
    zone:    "@zone_es_salles"
    niveau:  "avance"
    dureMin: 30
    contenu:
      - { type: "intro", text: "Un Game Master, c'est 50% de l'expérience client. Savoir doser les indices fait la différence entre une bonne et une mauvaise partie." }
      - { type: "step", number: 1, title: "Observation", text: "Regarder les joueurs via caméra + micro pendant 2 min avant d'intervenir. Ne jamais couper leur énergie." }
      - { type: "step", number: 2, title: "Indice progressif", text: "1er indice : orienter vers l'objet. 2e : donner le type d'action. 3e : donner la solution partielle. Dernier recours : solution." }
      - { type: "step", number: 3, title: "Règle des 3 minutes", text: "Si un groupe bloque > 3 min sans progrès : intervention. Mieux vaut un indice que 10 min de frustration." }
      - { type: "tip", text: "Adapter le ton : dramatique pour Le Manoir, complice pour Braquage, ironique pour La Sorcière." }
  tuto_es_reset:
    centre:  "@centre_escape"
    titre:   "Reset complet d'une salle en 15 min"
    zone:    "@zone_es_salles"
    niveau:  "intermediaire"
    dureMin: 20
    contenu:
      - { type: "intro", text: "Entre deux groupes : 15 min pour reset. Une salle mal resetée = expérience ratée pour le groupe suivant." }
      - { type: "step", number: 1, title: "Checklist scannée", text: "Utiliser la checklist papier plastifiée dans chaque salle. La cocher au stylo effaçable." }
      - { type: "step", number: 2, title: "Énigmes physiques", text: "Remettre chaque objet à sa position exacte. Vérifier les serrures fermées et les indices en place." }
      - { type: "step", number: 3, title: "Régie + automatismes", text: "Rebooter le scénario via la régie. Tester les 3 déclencheurs critiques avant d'annoncer la salle prête." }

