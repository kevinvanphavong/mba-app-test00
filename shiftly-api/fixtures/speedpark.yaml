App\Entity\Tutoriel:
  tuto_sp_brief_piste:
    centre:  "@centre_speedpark"
    titre:   "Brief pilote et règles de piste"
    zone:    "@zone_sp_piste"
    niveau:  "debutant"
    dureMin: 15
    contenu:
      - { type: "intro", text: "Un pilote mal briefé est un danger pour lui et pour les autres. Le brief est obligatoire, même pour les habitués." }
      - { type: "step", number: 1, title: "Drapeaux", text: "Vert : départ. Jaune : ralentir, pas de dépassement. Rouge : stop immédiat. Noir : pénalité individuelle." }
      - { type: "step", number: 2, title: "Règles de dépassement", text: "Dépassement à gauche uniquement sur la ligne droite. Pas de contact. Pas de blocage volontaire." }
      - { type: "step", number: 3, title: "En cas de souci", text: "Lever la main + ralentir + rester dans son kart. Ne JAMAIS descendre sur la piste." }
      - { type: "tip", text: "Pour les groupes d'anniversaires d'ados : insister 3× sur l'interdiction de contact — c'est le plus risqué." }
  tuto_sp_meca:
    centre:  "@centre_speedpark"
    titre:   "Vérif mécanique quotidienne des karts"
    zone:    "@zone_sp_atelier"
    niveau:  "avance"
    dureMin: 25
    contenu:
      - { type: "intro", text: "Un kart mal entretenu = un accident en puissance. Cette vérif est obligatoire chaque matin avant ouverture." }
      - { type: "step", number: 1, title: "Pneus", text: "Pression (1.4 bar à l'avant, 1.8 à l'arrière), usure (témoin rouge visible = à changer)." }
      - { type: "step", number: 2, title: "Freins", text: "Tester le frein à l'arrêt moteur coupé. Pédale ferme au 1/3 de la course. Sinon : hors service." }
      - { type: "step", number: 3, title: "Harnais", text: "Vérifier l'état des sangles et le verrouillage de la boucle. Aucun jeu ni effilochement toléré." }
      - { type: "tip", text: "Toute anomalie : karg hors service + fiche rouge + info immédiate au manager." }

