App\Entity\Tutoriel:
  tuto_kx_boba:
    centre:  "@centre_kixlab"
    titre:   "Préparer les boba — cuisson et conservation"
    zone:    "@zone_kx_bubbletea"
    niveau:  "debutant"
    dureMin: 15
    contenu:
      - { type: "intro", text: "Les perles de tapioca (boba) sont la base du bubble tea. Une mauvaise cuisson ou conservation ruine l'expérience client." }
      - { type: "step", number: 1, title: "Cuisson", text: "Eau bouillante, verser les boba sèches. Cuire 45 min à feu moyen. Remuer toutes les 10 min." }
      - { type: "step", number: 2, title: "Conservation", text: "Égoutter, passer sous eau froide 30 sec. Mettre dans l'eau sucrée chaude (sirop de canne). Durée max : 4h." }
      - { type: "step", number: 3, title: "En service", text: "Utiliser une cuillère trouée pour déposer les boba dans le gobelet avant de verser la boisson." }
      - { type: "tip", text: "Ne jamais réfrigérer les boba cuites — elles durcissent. Toujours jeter le restant à la fermeture." }
  tuto_kx_drops:
    centre:  "@centre_kixlab"
    titre:   "Gérer un drop sneakers — file et procédure"
    zone:    "@zone_kx_boutique"
    niveau:  "intermediaire"
    dureMin: 20
    contenu:
      - { type: "intro", text: "Les jours de drop sont les plus intenses. Une bonne organisation évite les incidents et garantit l'équité entre les clients." }
      - { type: "step", number: 1, title: "Avant l'ouverture", text: "Afficher le nombre de paires disponibles par taille sur le tableau de la vitrine. Préparer les tickets de passage." }
      - { type: "step", number: 2, title: "Gestion de la file", text: "Un seul client en boutique à la fois pour essayage. Les autres attendent dehors en ligne ordonnée." }
      - { type: "step", number: 3, title: "Vente", text: "Maximum 1 paire par personne, 1 coloris par visite. Vérifier la pièce d'identité si besoin." }
      - { type: "tip", text: "En cas de tension : prévenir le manager immédiatement. Ne jamais gérer seul une situation conflictuelle." }

