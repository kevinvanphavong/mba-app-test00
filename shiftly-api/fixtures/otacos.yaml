App\Entity\Tutoriel:
  tuto_ot_tacos:
    centre:  "@centre_otacos"
    titre:   "Assemblage tacos O'Tacos — la bonne séquence"
    zone:    "@zone_ot_production"
    niveau:  "debutant"
    dureMin: 15
    contenu:
      - { type: "intro", text: "Un tacos bien assemblé, c'est la signature d'O'Tacos. La séquence est standardisée : toujours la respecter." }
      - { type: "step", number: 1, title: "Tortilla", text: "Placer la tortilla sur le plan de travail, taille selon commande (M/L/XL/Géant)." }
      - { type: "step", number: 2, title: "Viandes + sauces", text: "Viandes choisies + sauces au centre (max 3 sauces). Ne pas déborder sur les bords." }
      - { type: "step", number: 3, title: "Frites + fromage", text: "Ajouter frites maison + sauce fromage chaude. Plier en 3 sans briser la tortilla." }
      - { type: "step", number: 4, title: "Presse panini", text: "Presser 2 min chrono. Sortir, emballer, remettre au client chaud." }
      - { type: "tip", text: "La sauce fromage chaude est critique : si elle est froide, le client reviendra l'échanger. Toujours la maintenir au bain-marie." }
  tuto_ot_livraison:
    centre:  "@centre_otacos"
    titre:   "Gérer les plateformes de livraison (Uber Eats / Deliveroo)"
    zone:    "@zone_ot_caisse"
    niveau:  "intermediaire"
    dureMin: 20
    contenu:
      - { type: "intro", text: "40% de notre CA vient des plateformes. Une commande mal gérée = 1 étoile + client perdu." }
      - { type: "step", number: 1, title: "Réception commande", text: "Tablette dédiée par plateforme. Valider en 30 sec max ou la commande est redirigée." }
      - { type: "step", number: 2, title: "Préparation", text: "Imprimer le ticket, transmettre en production. Noter l'heure de retrait livreur." }
      - { type: "step", number: 3, title: "Remise livreur", text: "Vérifier nom commande + pochette scellée. Ne jamais rouvrir une commande préparée." }
      - { type: "tip", text: "En cas de panne plateforme : passer en mode 'fermé' immédiatement pour éviter les commandes perdues." }

