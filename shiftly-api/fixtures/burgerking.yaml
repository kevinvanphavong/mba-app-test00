  tuto_bk_whopper:
    centre:  "@centre_burgerking"
    titre:   "Cuisson Whopper — le secret de la flamme"
    zone:    "@zone_bk_production"
    niveau:  "intermediaire"
    dureMin: 20
    contenu:
      - { type: "intro", text: "Le Whopper est cuit à la flamme, pas à la plaque. C'est la signature Burger King — et c'est ce qui nous distingue." }
      - { type: "step", number: 1, title: "Préchauffage", text: "Gril à 260°C. Vérifier avec sonde. Ne jamais cuire sur un gril froid (risque viande crue)." }
      - { type: "step", number: 2, title: "Cuisson", text: "Steak sur la grille, fermer. Temps réglementaire affiché par le minuteur — le respecter à la seconde." }
      - { type: "step", number: 3, title: "Repos", text: "Sortir, laisser 15 sec sur le plan, assembler immédiatement dans le pain préchauffé." }
      - { type: "tip", text: "Un steak trop cuit = jeté + fiche de perte. Mieux vaut jeter que servir un produit non conforme." }
  tuto_bk_haccp:
    centre:  "@centre_burgerking"
    titre:   "HACCP Burger King — fondamentaux"
    zone:    "@zone_bk_production"
    niveau:  "avance"
    dureMin: 30
    contenu:
      - { type: "intro", text: "HACCP = santé publique + réputation franchise. Zéro tolérance sur les écarts." }
      - { type: "step", number: 1, title: "Températures", text: "Froid : 0-4°C. Congelé : -18°C. Chaud : >63°C. Relevés toutes les 2h + signature." }
      - { type: "step", number: 2, title: "Traçabilité", text: "Chaque produit ouvert : étiquette avec date et heure. Pas d'étiquette = jeté." }
      - { type: "step", number: 3, title: "Nettoyage", text: "Fin de service : dégraissage grils, filtrage huile, sol complet. Registre signé." }

