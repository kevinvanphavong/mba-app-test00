  m_vr_sal_ouv_4:  { zone: "@zone_vr_salles", texte: "Contrôler câbles de plafond (aucun emmêlement) et marquage au sol", categorie: "OUVERTURE", frequence: "FIXE", priorite: "important", ordre: 4 }
