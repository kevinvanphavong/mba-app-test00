App\Entity\Tutoriel:
  tuto_vr_brief:
    centre:  "@centre_vrgalaxy"
    titre:   "Brief VR et prévention du mal de transport"
    zone:    "@zone_vr_salles"
    niveau:  "intermediaire"
    dureMin: 15
    contenu:
      - { type: "intro", text: "Le mal de transport (cybersickness) touche 10% des joueurs. Un bon brief le prévient dans la majorité des cas." }
      - { type: "step", number: 1, title: "Réglage du casque", text: "Ajuster la sangle arrière, la distance interpupillaire (IPD) et la netteté avant de lancer le jeu." }
      - { type: "step", number: 2, title: "Consignes clés", text: "Stopper dès que nausée apparaît, bouton pause (menu) sur la manette gauche, respiration calme." }
      - { type: "step", number: 3, title: "Surveillance", text: "Observer posture et visage du joueur via l'écran de retour. Intervenir au premier signe de pâleur." }
      - { type: "tip", text: "Pour les débutants : privilégier Beat Saber ou Job Simulator, éviter les jeux à déplacement libre." }
  tuto_vr_hygiene:
    centre:  "@centre_vrgalaxy"
    titre:   "Protocole hygiène casques VR"
    zone:    "@zone_vr_salles"
    niveau:  "debutant"
    dureMin: 10
    contenu:
      - { type: "intro", text: "Entre chaque joueur, les mousses du casque doivent être désinfectées. Obligation sanitaire post-COVID." }
      - { type: "step", number: 1, title: "Démonter la mousse", text: "Retirer la mousse velcro de la zone front. Jamais frotter la lentille directement." }
      - { type: "step", number: 2, title: "Désinfecter", text: "Lingette virucide dédiée (pas d'alcool sur les lentilles). Attendre 30 sec avant remontage." }
      - { type: "step", number: 3, title: "Test final", text: "Vérifier buée / trace sur la lentille avec une lampe avant le joueur suivant." }

