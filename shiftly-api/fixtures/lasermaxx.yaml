App\Entity\Mission:
  m_lm_acc_ouv_1:  { zone: "@zone_lm_accueil", texte: "Allumer la borne caisse, vérifier le TPE et le fond de caisse (80€)", categorie: "OUVERTURE", frequence: "FIXE", priorite: "vitale", ordre: 1 }
