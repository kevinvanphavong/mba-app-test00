App\Entity\Tutoriel:
  tuto_lm_brief:
    centre:  "@centre_lasermaxx"
    titre:   "Briefing sécurité avant partie"
    zone:    "@zone_lm_arene"
    niveau:  "debutant"
    dureMin: 10
    contenu:
      - { type: "intro", text: "Un briefing clair évite 90% des incidents en arène. Toujours le faire avant chaque groupe, sans exception." }
      - { type: "step", number: 1, title: "Consignes interdits", text: "Pas de course, pas de contact physique, pas de gilet retiré pendant la partie." }
      - { type: "step", number: 2, title: "Utilisation du gilet", text: "Montrer comment tenir le pistolet, la zone de tir et la recharge au socle." }
      - { type: "step", number: 3, title: "Sécurité", text: "Indiquer les sorties de secours, la position du bouton d'arrêt d'urgence et le signal lumineux de fin de partie." }
      - { type: "tip", text: "Adapter le ton selon l'âge : ludique pour les enfants, plus rigoureux pour les anniversaires d'ados." }
  tuto_lm_gilets:
    centre:  "@centre_lasermaxx"
    titre:   "Maintenance quotidienne des gilets"
    zone:    "@zone_lm_arene"
    niveau:  "intermediaire"
    dureMin: 15
    contenu:
      - { type: "intro", text: "Un gilet mal entretenu ruine l'expérience client. Vérification quotidienne obligatoire." }
      - { type: "step", number: 1, title: "Contrôle visuel", text: "Vérifier chaque capteur (épaules, poitrine, dos) — aucune fissure acceptée." }
      - { type: "step", number: 2, title: "Test logiciel", text: "Lancer le mode diagnostic : allumer chaque gilet, tirer sur chaque capteur, valider LED verte." }
      - { type: "step", number: 3, title: "Charge", text: "Tous les gilets sur rack de charge en fin de service. Jamais laisser un gilet décharger en dehors du rack." }
      - { type: "tip", text: "Un gilet qui clignote rouge trois fois : le sortir du service et prévenir le manager." }

