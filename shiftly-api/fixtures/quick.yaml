App\Entity\Tutoriel:
  tuto_q_gril:
    centre:  "@centre_quick"
    titre:   "Maîtriser la cuisson au gril (Quick Standard)"
    zone:    "@zone_q_production"
    niveau:  "intermediaire"
    dureMin: 20
    contenu:
      - { type: "intro", text: "Le gril est au cœur de notre qualité produit. Une cuisson précise garantit la satisfaction client et le respect des normes HACCP." }
      - { type: "step", number: 1, title: "Préchauffage", text: "Allumer le gril 15 min avant ouverture. Température cible : 220°C surface. Vérifier avec la sonde." }
      - { type: "step", number: 2, title: "Cuisson steak", text: "Poser le steak décongelé. Refermer le couvercle. Respecter le temps de cuisson affiché sur le minuteur." }
      - { type: "step", number: 3, title: "Temps de vie", text: "Tout produit cuit doit être utilisé sous 10 min en holding. Au-delà : jeter et retracer sur la feuille de perte." }
      - { type: "tip", text: "Ne jamais surcharger le gril : 4 steaks max simultanément pour garantir une cuisson homogène." }
  tuto_q_drive:
    centre:  "@centre_quick"
    titre:   "Procédure drive : accueil et service rapide"
    zone:    "@zone_q_drive"
    niveau:  "debutant"
    dureMin: 15
    contenu:
      - { type: "intro", text: "Le drive représente 40% du chiffre d'affaires. Rapidité et précision sont essentielles." }
      - { type: "step", number: 1, title: "Prise de commande", text: "Répondre en moins de 10 secondes. Articuler clairement. Répéter la commande pour validation." }
      - { type: "step", number: 2, title: "Préparation du sac", text: "Boissons d'abord, puis solides. Vérifier que chaque article est dans le sac avant de fermer." }
      - { type: "step", number: 3, title: "Remise au client", text: "Sourire, nommer le montant, remettre la monnaie avant le sac. Dire 'Bonne journée !' à chaque client." }
      - { type: "tip", text: "Objectif : client repart en moins de 3 min depuis la borne de commande." }
  tuto_q_haccp:
    centre:  "@centre_quick"
    titre:   "Normes HACCP — les fondamentaux"
    zone:    "@zone_q_production"
    niveau:  "avance"
    dureMin: 30
    contenu:
      - { type: "intro", text: "Le respect des normes HACCP est une obligation légale et un enjeu de santé publique. Tout écart doit être signalé." }
      - { type: "step", number: 1, title: "Températures réglementaires", text: "Froid positif : 0 à 4°C. Froid négatif : -18°C. Chaud : >63°C. Relevés toutes les 2h." }
      - { type: "step", number: 2, title: "Traçabilité DLC", text: "Chaque produit doit afficher sa DLC originale et la date d'ouverture. Appliquer systématiquement l'étiquette de date." }
      - { type: "step", number: 3, title: "En cas d'anomalie", text: "Produit hors température : isoler, noter sur la fiche d'anomalie, prévenir le manager. Ne jamais remettre en service sans validation." }
      - { type: "tip", text: "En cas de doute sur un produit : la règle est toujours de le jeter. Le coût d'un produit est infime comparé à une intoxication alimentaire." }

